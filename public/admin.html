<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administrador - Dinopedia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="layout-wrapper">
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div class="form-container" style="max-width:600px;">
        <h2><i class="bi bi-plus-circle-fill"></i> Agregar Nuevo Dinosaurio</h2>
        
        <div class="form-group">
          <label for="adm-nombre">Nombre *</label>
          <input type="text" id="adm-nombre" required>
        </div>
        <div class="form-group">
          <label for="adm-tamanio">Tamaño</label>
          <input type="text" id="adm-tamanio">
        </div>
        <div class="form-group">
          <label for="adm-peso">Peso</label>
          <input type="text" id="adm-peso">
        </div>
        <div class="form-group">
          <label for="adm-dieta">Dieta</label>
          <input type="text" id="adm-dieta">
        </div>
        <div class="form-group">
          <label for="adm-ubicacion">Ubicación</label>
          <input type="text" id="adm-ubicacion">
        </div>
        <div class="form-group">
          <label for="adm-imagen-url">URL de Imagen</label>
          <input type="url" id="adm-imagen-url">
        </div>
        <div class="form-group">
          <label for="adm-descripcion">Descripción</label>
          <textarea id="adm-descripcion" rows="4"></textarea>
        </div>
        
        <button id="btn-agregar" class="btn"><i class="bi bi-cloud-arrow-up-fill"></i> Agregar Dinosaurio</button>
        <p id="adm-msg"></p>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/layout.js"></script>
  <script src="js/session.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
