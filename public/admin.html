<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administrador - Dinopedia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1><a href="/">Dinopedia</a></h1>
    <nav>
      <a href="#" id="btn-logout">Cerrar sesión</a>
    </nav>
  </header>

  <main>
    <div class="form-container" style="max-width:600px;">
      <h2>Agregar Nuevo Dinosaurio</h2>
      
      <div class="form-group">
        <label for="adm-nombre">Nombre *</label>
        <input type="text" id="adm-nombre" required>
      </div>
      <div class="form-group">
        <label for="adm-tamanio">Tamaño</label>
        <input type="text" id="adm-tamanio">
      </div>
      <div class="form-group">
        <label for="adm-peso">Peso</label>
        <input type="text" id="adm-peso">
      </div>
      <div class="form-group">
        <label for="adm-dieta">Dieta</label>
        <input type="text" id="adm-dieta">
      </div>
      <div class="form-group">
        <label for="adm-ubicacion">Ubicación</label>
        <input type="text" id="adm-ubicacion">
      </div>
      <div class="form-group">
        <label for="adm-imagen-url">URL de Imagen</label>
        <input type="url" id="adm-imagen-url">
      </div>
      <div class="form-group">
        <label for="adm-descripcion">Descripción</label>
        <textarea id="adm-descripcion" rows="4"></textarea>
      </div>
      
      <button id="btn-agregar">Agregar Dinosaurio</button>
      <p id="adm-msg"></p>
    </div>
  </main>

  <script src="js/session.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
