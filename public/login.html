<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dinopedia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="layout-wrapper">
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div class="form-container">
        <h2><i class="bi bi-person-badge-fill"></i> Acceso Administrador</h2>
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" placeholder="Usuario admin">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Contraseña">
        </div>
        <button id="btn-login" class="btn"><i class="bi bi-box-arrow-in-right"></i> Ingresar</button>
        <p id="error-msg">Credenciales inválidas.</p>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/layout.js"></script>
  <script src="js/session.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
